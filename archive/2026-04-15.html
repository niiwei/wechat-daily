<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公众号订阅日报 - 2026-04-15</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">
  <style>
    :root { --bg-primary: #f7f5f0; --bg-card: #faf8f3; --text-primary: #1a1a1a; --text-secondary: #5c5c5c; --text-muted: #8a8a8a; --accent: #8b4513; --accent-light: #d4a574; --border: #d9d3c7; --border-dark: #b8b0a0; --bg-secondary: #f0ece3; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Source Serif 4', Georgia, serif; background: var(--bg-primary); color: var(--text-primary); line-height: 1.7; font-size: 16px; }
    .container { max-width: 900px; margin: 0 auto; padding: 60px 40px; }
    header { text-align: center; margin-bottom: 60px; padding-bottom: 40px; border-bottom: 3px double var(--border-dark); }
    .masthead { font-family: 'Playfair Display', Georgia, serif; font-size: 3.5rem; font-weight: 700; margin-bottom: 12px; }
    .tagline { font-family: 'Playfair Display', Georgia, serif; font-style: italic; font-size: 1.1rem; color: var(--text-secondary); margin-bottom: 24px; }
    .edition-info { display: flex; justify-content: center; gap: 24px; font-size: 0.9rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; }
    .back-link { display: inline-block; margin-top: 20px; color: var(--text-muted); text-decoration: none; font-size: 0.9rem; }
    .back-link:hover { color: var(--accent); }
    .overview { background: var(--bg-card); border: 1px solid var(--border); padding: 32px; margin-bottom: 60px; text-align: center; }
    .overview-header { font-family: 'Playfair Display', Georgia, serif; font-size: 1.5rem; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
    .stats-line { font-size: 1.1rem; color: var(--text-secondary); }
    .stats-line strong { color: var(--accent); }
    .category-section { margin-bottom: 60px; }
    .category-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; padding-bottom: 12px; border-bottom: 2px solid var(--text-primary); }
    .category-name { font-family: 'Playfair Display', Georgia, serif; font-size: 1.5rem; font-weight: 600; }
    .category-count { font-size: 0.9rem; color: var(--text-muted); font-style: italic; }
    .article-list { list-style: none; }
    .article-item { padding: 16px 0; border-bottom: 1px dotted var(--border); }
    .article-title { font-size: 1.1rem; font-weight: 600; color: var(--text-primary); text-decoration: none; display: block; margin-bottom: 8px; }
    .article-title:hover { color: var(--accent); }
    .article-title::before { content: '› '; color: var(--accent-light); }
    .article-meta { display: flex; align-items: center; gap: 12px; font-size: 0.85rem; color: var(--text-muted); }
    .source-tag { padding: 2px 10px; background: var(--bg-secondary); border: 1px solid var(--border); font-size: 0.8rem; }
    footer { text-align: center; padding: 40px; color: var(--text-muted); font-size: 0.85rem; font-style: italic; border-top: 1px solid var(--border); margin-top: 60px; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1 class="masthead">公众号订阅日报</h1>
      <p class="tagline">每日精选 · 去芜存菁</p>
      <div class="edition-info"><span id="current-date">Loading...</span><span>Daily Digest</span></div>
      <a href="../index.html" class="back-link">← 返回存档首页</a>
    </header>
    <div id="overview"></div>
    <main id="content"></main>
    <footer><p>Generated by 小王 bot · 每日自动更新</p></footer>
  </div>
  <script>
    async function loadData() {
      try {
        const r = await fetch('./2026-04-15.json');
        const data = await r.json();
        if (data.date) document.getElementById('current-date').textContent = data.date;
        document.getElementById('overview').innerHTML = `<div class="overview"><div class="overview-header">本期概览</div><div class="stats-line">共收录 <strong>${data.totalArticles}</strong> 篇文章，分为 <strong>${data.categories.length}</strong> 个主题</div></div>`;
        document.getElementById('content').innerHTML = data.categories.map(cat => `
          <section class="category-section">
            <div class="category-header"><h2 class="category-name">${cat.name}</h2><span class="category-count">${cat.articles.length} 篇</span></div>
            <ul class="article-list">${cat.articles.map(a => `
              <li class="article-item">
                <a href="${a.link}" target="_blank" class="article-title">${a.title}</a>
                <div class="article-meta"><span class="source-tag">${a.source}</span><span>${a.publishTime}</span></div>
              </li>`).join('')}</ul>
          </section>`).join('');
      } catch(e) {
        document.getElementById('content').innerHTML = '<p style="text-align:center;padding:80px;color:#999;font-style:italic">加载失败，请稍后再试</p>';
      }
    }
    loadData();
  </script>
</body>
</html>
