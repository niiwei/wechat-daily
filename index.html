<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公众号订阅日报</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #faf9f7;
      --bg-secondary: #f5f3f0;
      --bg-card: #ffffff;
      --bg-highlight: #fef9e7;
      --text-primary: #1a1a1a;
      --text-secondary: #666666;
      --text-muted: #999999;
      --accent: #2563eb;
      --accent-light: #dbeafe;
      --accent-orange: #f97316;
      --accent-green: #22c55e;
      --accent-purple: #8b5cf6;
      --border: #e5e5e5;
      --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.02);
      --shadow-hover: 0 4px 12px rgba(0,0,0,0.08);
      --radius: 12px;
      --radius-lg: 16px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    @media (min-width: 1400px) {
      .container {
        max-width: 1400px;
        padding: 48px 32px;
      }
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 48px;
      padding-bottom: 32px;
      border-bottom: 1px solid var(--border);
    }

    h1 {
      font-family: 'Noto Serif SC', serif;
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 1rem;
      margin-bottom: 20px;
    }

    .meta-badges {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.875rem;
      font-weight: 500;
    }

    .badge-primary {
      background: var(--accent-light);
      color: var(--accent);
    }

    .badge-secondary {
      background: var(--bg-secondary);
      color: var(--text-secondary);
    }

    /* Overview Section */
    .overview {
      background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-highlight) 100%);
      border-radius: var(--radius-lg);
      padding: 32px;
      margin-bottom: 40px;
      border: 1px solid var(--border);
    }

    .overview-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      font-size: 1.25rem;
      font-weight: 700;
    }

    .overview-icon {
      font-size: 1.5rem;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--bg-card);
      padding: 20px;
      border-radius: var(--radius);
      text-align: center;
      box-shadow: var(--shadow);
    }

    .stat-number {
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    .sources-list {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .source-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-card);
      padding: 10px 16px;
      border-radius: 20px;
      font-size: 0.9rem;
      box-shadow: var(--shadow);
    }

    .source-count {
      background: var(--accent);
      color: white;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    /* Content Sections */
    .content-section {
      margin-bottom: 48px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--text-primary);
    }

    .section-icon {
      font-size: 1.5rem;
    }

    .section-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 1.5rem;
      font-weight: 600;
    }

    /* Accounts Grid */
    .accounts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 20px;
    }

    @media (min-width: 1200px) {
      .accounts-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 1400px) {
      .accounts-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .account-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: box-shadow 0.2s ease;
    }

    .account-card:hover {
      box-shadow: var(--shadow-hover);
    }

    .account-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
      border-bottom: 1px solid var(--border);
    }

    .account-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-purple) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .account-info {
      flex: 1;
      min-width: 0;
    }

    .account-name {
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .account-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .article-list {
      padding: 4px 0;
    }

    .article-item {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s ease;
    }

    .article-item:last-child {
      border-bottom: none;
    }

    .article-item:hover {
      background: var(--bg-secondary);
    }

    .article-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
      text-decoration: none;
      display: block;
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .article-title:hover {
      color: var(--accent);
    }

    .article-summary {
      font-size: 0.875rem;
      color: var(--text-secondary);
      line-height: 1.7;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .article-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 10px;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .article-tag {
      background: var(--bg-secondary);
      padding: 2px 8px;
      border-radius: 4px;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
      font-size: 0.85rem;
      border-top: 1px solid var(--border);
      margin-top: 40px;
    }

    /* Mobile */
    @media (max-width: 768px) {
      .container {
        padding: 24px 16px;
      }

      h1 {
        font-size: 1.75rem;
      }

      .overview {
        padding: 20px;
      }

      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .accounts-grid {
        grid-template-columns: 1fr;
      }

      .section-title {
        font-size: 1.25rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📰 公众号订阅日报</h1>
      <p class="subtitle">每日精选 · 去芜存菁</p>
      <div class="meta-badges">
        <span class="badge badge-primary" id="current-date">📅 加载中...</span>
        <span class="badge badge-secondary">🤖 AI 自动整理</span>
      </div>
    </header>

    <div id="overview">
      <!-- 概览区 -->
    </div>

    <main id="content">
      <!-- 内容区 -->
    </main>

    <footer>
      <p>Generated by OpenClaw · 每日自动更新</p>
    </footer>
  </div>

  <script>
    // 动态插入当前日期
    document.getElementById('current-date').textContent = '📅 ' + new Date().toLocaleDateString('zh-CN', {
      year: 'numeric',
      month: 'long',
      day: 'numeric',
      weekday: 'long'
    });

    // 加载日报数据
    async function loadDailyData() {
      try {
        const response = await fetch('./data/daily.json');
        const data = await response.json();
        renderOverview(data);
        renderContent(data);
      } catch (error) {
        console.error('加载数据失败:', error);
        document.getElementById('content').innerHTML = `
          <div class="empty-state">
            <p>暂无数据，请稍后再试</p>
          </div>
        `;
      }
    }

    function renderOverview(data) {
      if (!data || !data.days || data.days.length === 0) return;

      const day = data.days[0];
      const totalAccounts = day.accounts.length;

      const overviewHtml = `
        <div class="overview">
          <div class="overview-header">
            <span class="overview-icon">📊</span>
            <span>今日概览</span>
          </div>

          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-number">${day.totalArticles}</div>
              <div class="stat-label">文章总数</div>
            </div>
            <div class="stat-card">
              <div class="stat-number">${totalAccounts}</div>
              <div class="stat-label">更新公众号</div>
            </div>
          </div>

          <div class="sources-list">
            ${day.accounts.map(account => `
              <span class="source-tag">
                ${account.name}
                <span class="source-count">${account.articles.length}</span>
              </span>
            `).join('')}
          </div>
        </div>
      `;

      document.getElementById('overview').innerHTML = overviewHtml;
    }

    function renderContent(data) {
      const container = document.getElementById('content');

      if (!data || !data.days || data.days.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <p>暂无更新内容</p>
          </div>
        `;
        return;
      }

      const day = data.days[0];

      container.innerHTML = `
        <section class="content-section">
          <div class="section-header">
            <span class="section-icon">📑</span>
            <h2 class="section-title">文章列表</h2>
          </div>

          <div class="accounts-grid">
            ${day.accounts.map(account => `
              <div class="account-card">
                <div class="account-header">
                  <div class="account-avatar">${account.name.charAt(0)}</div>
                  <div class="account-info">
                    <div class="account-name">${account.name}</div>
                    <div class="account-meta">${account.articles.length} 篇文章</div>
                  </div>
                </div>

                <div class="article-list">
                  ${account.articles.map(article => `
                    <article class="article-item">
                      <a href="${article.link}" target="_blank" class="article-title">${article.title}</a>
                      <p class="article-summary">${article.summary}</p>
                      <div class="article-meta">
                        <span>🕐 ${article.publishTime}</span>
                      </div>
                    </article>
                  `).join('')}
                </div>
              </div>
            `).join('')}
          </div>
        </section>
      `;
    }

    // 页面加载时获取数据
    loadDailyData();
  </script>
</body>
</html>
