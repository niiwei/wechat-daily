<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公众号订阅日报</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #f7f5f0;
      --bg-secondary: #f0ece3;
      --bg-card: #faf8f3;
      --text-primary: #1a1a1a;
      --text-secondary: #5c5c5c;
      --text-muted: #8a8a8a;
      --accent: #8b4513;
      --accent-light: #d4a574;
      --border: #d9d3c7;
      --border-dark: #b8b0a0;
      --shadow: 0 2px 8px rgba(0,0,0,0.06);
      --shadow-hover: 0 4px 16px rgba(0,0,0,0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Source Serif 4', 'Noto Serif SC', Georgia, serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.7;
      min-height: 100vh;
      font-size: 16px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 40px;
    }

    @media (min-width: 1200px) {
      .container {
        max-width: 1000px;
        padding: 80px 60px;
      }
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 60px;
      padding-bottom: 40px;
      border-bottom: 3px double var(--border-dark);
    }

    .masthead {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 3.5rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
      color: var(--text-primary);
    }

    .tagline {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      font-size: 1.1rem;
      color: var(--text-secondary);
      margin-bottom: 24px;
      letter-spacing: 0.02em;
    }

    .edition-info {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 24px;
      font-size: 0.9rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .edition-info span {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .edition-info::before,
    .edition-info::after {
      content: '—';
      color: var(--border-dark);
    }

    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
    }

    .back-link:hover {
      color: var(--accent);
    }

    /* Overview */
    .overview {
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 32px;
      margin-bottom: 60px;
      position: relative;
    }

    .overview::before {
      content: '';
      position: absolute;
      top: 4px;
      left: 4px;
      right: 4px;
      bottom: 4px;
      border: 1px solid var(--border);
      pointer-events: none;
    }

    .overview-header {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.5rem;
      font-weight: 600;
      text-align: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .stats-line {
      text-align: center;
      font-size: 1.1rem;
      color: var(--text-secondary);
      margin-bottom: 24px;
    }

    .stats-line strong {
      color: var(--accent);
      font-weight: 600;
    }

    /* Category Sections */
    .category-section {
      margin-bottom: 60px;
      page-break-inside: avoid;
    }

    .category-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--text-primary);
    }

    .category-name {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .category-count {
      font-size: 0.9rem;
      color: var(--text-muted);
      font-style: italic;
    }

    /* Article List */
    .article-list {
      list-style: none;
    }

    .article-item {
      padding: 16px 0;
      border-bottom: 1px dotted var(--border);
      transition: background 0.2s ease;
    }

    .article-item:last-child {
      border-bottom: none;
    }

    .article-item:hover {
      background: var(--bg-secondary);
      margin: 0 -16px;
      padding-left: 16px;
      padding-right: 16px;
    }

    .article-title {
      font-family: 'Source Serif 4', 'Noto Serif SC', Georgia, serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-primary);
      text-decoration: none;
      display: block;
      line-height: 1.5;
      margin-bottom: 8px;
    }

    .article-title:hover {
      color: var(--accent);
    }

    .article-title::before {
      content: '› ';
      color: var(--accent-light);
    }

    .article-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .source-tag {
      display: inline-block;
      padding: 2px 10px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      font-size: 0.8rem;
      font-style: normal;
    }

    .publish-time {
      font-style: italic;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 80px 40px;
      color: var(--text-muted);
      font-style: italic;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 60px;
      color: var(--text-muted);
      font-style: italic;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      font-size: 0.85rem;
      font-style: italic;
      border-top: 1px solid var(--border);
      margin-top: 60px;
    }

    /* Mobile */
    @media (max-width: 768px) {
      .container {
        padding: 40px 24px;
      }

      .masthead {
        font-size: 2.5rem;
      }

      .edition-info {
        flex-direction: column;
        gap: 8px;
      }

      .edition-info::before,
      .edition-info::after {
        display: none;
      }

      .overview {
        padding: 24px;
      }

      .article-meta {
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1 class="masthead">公众号订阅日报</h1>
      <p class="tagline">每日精选 · 去芜存菁</p>
      <div class="edition-info">
        <span id="current-date">Loading...</span>
        <span>Daily Digest</span>
      </div>
      <a href="./index.html" class="back-link">← 返回存档首页</a>
    </header>

    <div id="overview">
      <!-- 概览区 -->
    </div>

    <main id="content">
      <!-- 分类内容 -->
    </main>

    <footer>
      <p>Generated by OpenClaw · 每日自动更新</p>
    </footer>
  </div>

  <script>
    // 加载日报数据
    async function loadDailyData() {
      try {
        const response = await fetch('./data/daily.json');
        const data = await response.json();

        // 设置日期
        if (data.date) {
          document.getElementById('current-date').textContent = data.date;
        }

        renderOverview(data);
        renderContent(data);
      } catch (error) {
        console.error('加载数据失败:', error);
        document.getElementById('content').innerHTML = `
          <div class="empty-state">
            <p>暂无数据，请稍后再试</p>
          </div>
        `;
      }
    }

    function renderOverview(data) {
      if (!data || !data.categories) return;

      const totalCategories = data.categories.length;

      const overviewHtml = `
        <div class="overview">
          <div class="overview-header">本期概览</div>
          <div class="stats-line">
            共收录 <strong>${data.totalArticles}</strong> 篇文章，
            分为 <strong>${totalCategories}</strong> 个主题
          </div>
        </div>
      `;

      document.getElementById('overview').innerHTML = overviewHtml;
    }

    function renderContent(data) {
      const container = document.getElementById('content');

      if (!data || !data.categories || data.categories.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <p>暂无更新内容</p>
          </div>
        `;
        return;
      }

      container.innerHTML = data.categories.map(category => `
        <section class="category-section">
          <div class="category-header">
            <h2 class="category-name">${category.name}</h2>
            <span class="category-count">${category.articles.length} 篇</span>
          </div>

          <ul class="article-list">
            ${category.articles.map(article => `
              <li class="article-item">
                <a href="${article.link}" target="_blank" class="article-title">${article.title}</a>
                <div class="article-meta">
                  <span class="source-tag">${article.source}</span>
                  <span class="publish-time">${article.publishTime}</span>
                </div>
              </li>
            `).join('')}
          </ul>
        </section>
      `).join('');
    }

    // 页面加载时获取数据
    loadDailyData();
  </script>
</body>
</html>
